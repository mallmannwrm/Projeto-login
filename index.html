<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/mediaquery.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=key,person" />
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem-vindo(a). <br> Faça login para acessar sua conta e configurar seu ambiente!</p>
                <form action="login.php" method="post" autocomplete="on">
                    <div class="campo">
                        <label for="usuario"><span class="material-symbols-outlined">person</span></label>
                        <input type="email" id="usuario" placeholder=" Usuário">
                    </div>
                    <div class="campo">
                        <label for="senha"><span class="material-symbols-outlined">key</span></label>
                        <input type="password" id="senha" placeholder=" Senha">
                    </div>
                    <input type="submit" id="Enviar">
                    <div>
                        <a href="esqueci.html">Esqueci a senha</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
